<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Intake Calculator — JERAI FITNESS</title>
  <meta name="description" content="Find out how much water you should drink daily based on your weight, activity level, and climate." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #030712;
      color: #f3f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .container { max-width: 480px; width: 100%; }
    .brand { text-align: center; margin-bottom: 2rem; }
    .brand h2 { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; }
    .brand h2 span { color: #2563eb; }
    .card {
      background: rgba(17, 24, 39, 0.6);
      border: 1px solid rgba(55, 65, 81, 0.5);
      border-radius: 1.25rem;
      padding: 2rem;
      backdrop-filter: blur(12px);
    }
    h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; text-align: center; }
    h1 span {
      background: linear-gradient(135deg, #2563eb, #1a4fd4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle { color: #9ca3af; text-align: center; font-size: 0.875rem; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; color: #9ca3af; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
    input, select {
      width: 100%; background: rgba(31, 41, 55, 0.5); border: 1px solid rgba(55, 65, 81, 0.5);
      border-radius: 0.75rem; padding: 0.75rem 1rem; color: #f3f4f6;
      font-size: 1rem; font-family: inherit; transition: border-color 0.2s; outline: none;
      -webkit-appearance: none;
    }
    input:focus, select:focus { border-color: rgba(37, 99, 235, 0.5); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
    select option { background: #1f2937; color: #f3f4f6; }
    .btn {
      width: 100%; padding: 0.875rem; border: none; border-radius: 0.75rem;
      font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer;
      background: linear-gradient(135deg, #2563eb, #1a4fd4); color: white;
      transition: all 0.2s; box-shadow: 0 4px 16px rgba(37, 99, 235, 0.25); margin-top: 0.5rem;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4); }
    .btn:active { transform: scale(0.98); }
    .result {
      margin-top: 1.5rem; padding: 1.5rem; background: rgba(31, 41, 55, 0.4);
      border-radius: 1rem; text-align: center; display: none;
    }
    .result.show { display: block; animation: fadeIn 0.3s ease; }
    .result-value {
      font-size: 3rem; font-weight: 800;
      background: linear-gradient(135deg, #2563eb, #1a4fd4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .result-label { color: #9ca3af; font-size: 0.875rem; margin-top: 0.25rem; }
    .result-sub {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }
    .result-sub-item {
      text-align: center;
    }
    .result-sub-item .value {
      font-size: 1.25rem;
      font-weight: 700;
      color: #60a5fa;
    }
    .result-sub-item .label {
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: 0.25rem;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 480px) { body { padding: 1rem 0.75rem; } .card { padding: 1.5rem; } h1 { font-size: 1.45rem; } .result-value { font-size: 2.5rem; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand"><h2>JERAI <span>FITNESS</span></h2></div>
    <div class="card">
      <h1>Water Intake <span>Calculator</span></h1>
      <p class="subtitle">Find out how much water you need daily for optimal performance</p>

      <form onsubmit="calculate(event)">
        <div class="form-group">
          <label for="weight">Weight (kg)</label>
          <input type="number" id="weight" placeholder="70" step="0.1" min="1" required />
        </div>

        <div class="form-group">
          <label for="activity">Activity Level</label>
          <select id="activity" required>
            <option value="">Select activity level</option>
            <option value="sedentary">Sedentary (little or no exercise)</option>
            <option value="light">Lightly Active (1-3 days/week)</option>
            <option value="moderate">Moderately Active (3-5 days/week)</option>
            <option value="active">Very Active (6-7 days/week)</option>
            <option value="extreme">Extra Active (2x/day or physical job)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="climate">Climate</label>
          <select id="climate" required>
            <option value="">Select climate</option>
            <option value="cool">Cool / Cold</option>
            <option value="temperate">Temperate / Moderate</option>
            <option value="hot">Hot / Humid</option>
          </select>
        </div>

        <button type="submit" class="btn">Calculate Water Intake</button>
      </form>

      <div id="result" class="result" role="status" aria-live="polite">
        <div class="result-value" id="water-value">—</div>
        <div class="result-label">Liters per day</div>
        <div class="result-sub">
          <div class="result-sub-item">
            <div class="value" id="glasses-value">—</div>
            <div class="label">Glasses (250ml)</div>
          </div>
          <div class="result-sub-item">
            <div class="value" id="bottles-value">—</div>
            <div class="label">Bottles (500ml)</div>
          </div>
          <div class="result-sub-item">
            <div class="value" id="oz-value">—</div>
            <div class="label">Fluid oz</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const activityMultipliers = {
      sedentary: 1.0,
      light: 1.1,
      moderate: 1.25,
      active: 1.4,
      extreme: 1.6,
    };
    const climateMultipliers = {
      cool: 1.0,
      temperate: 1.1,
      hot: 1.25,
    };

    function calculate(e) {
      e.preventDefault();
      const weight = parseFloat(document.getElementById('weight').value);
      const activity = document.getElementById('activity').value;
      const climate = document.getElementById('climate').value;

      if (!weight || !activity || !climate) return;

      // Base: 35ml per kg body weight
      let waterML = weight * 35;
      waterML *= activityMultipliers[activity];
      waterML *= climateMultipliers[climate];

      const liters = (waterML / 1000).toFixed(1);
      const glasses = Math.round(waterML / 250);
      const bottles = (waterML / 500).toFixed(1);
      const oz = Math.round(waterML * 0.033814);

      document.getElementById('water-value').textContent = liters + 'L';
      document.getElementById('glasses-value').textContent = glasses;
      document.getElementById('bottles-value').textContent = bottles;
      document.getElementById('oz-value').textContent = oz;
      document.getElementById('result').classList.add('show');
    }
  </script>
</body>
</html>
